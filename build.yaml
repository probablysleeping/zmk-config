---
include:
  - board: eyelash_corne_left
    shield: nice_view
    cmake-args: -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DCONFIG_ZMK_USB=n
    artifact-name: eyelash_corne_left_peripheral
  - board: eyelash_corne_right
    shield: nice_view
    artifact-name: eyelash_corne_right_peripheral
  - board: eyelash_corne_left
    cmake-args: -DCONFIG_ZMK_POINTING=y -DCONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y -DCONFIG_ZMK_HID_REPORT_TYPE_NKRO=y
    artifact-name: eyelash_corne_dongle
  - board: nice_nano_v2
    shield: settings_reset
